<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NUST NEXUS — The ultimate academic resource hub for NUST students. Share, download, and collaborate on course materials." />
  <meta name="theme-color" content="#F2F4F5" />
  <title>NUST NEXUS — Student Academic Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <!-- Global Loading Overlay -->
  <div id="global-loader" class="global-loader active">
    <div class="loader-content">
      <div class="loader-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="80" height="80" class="loader-logo-img logo-3d-spin">
          <defs>
            <linearGradient id="origamiLeft" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#E0E0E0" />
              <stop offset="100%" stop-color="#9E9E9E" />
            </linearGradient>
            <linearGradient id="origamiDiag" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#FFFFFF" />
              <stop offset="100%" stop-color="#BDBDBD" />
            </linearGradient>
            <linearGradient id="origamiRight" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#757575" />
              <stop offset="100%" stop-color="#424242" />
            </linearGradient>
            <filter id="origamiShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="4" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.4" />
            </filter>
            <filter id="origamiBaseShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.2" />
            </filter>
          </defs>
          <polygon points="75,20 95,30 95,100 75,90" fill="url(#origamiRight)" filter="url(#origamiBaseShadow)" />
          <polygon points="25,20 45,30 45,100 25,90" fill="url(#origamiLeft)" filter="url(#origamiBaseShadow)" />
          <polygon points="25,20 45,30 95,100 75,90" fill="url(#origamiDiag)" filter="url(#origamiShadow)" />
          <polygon points="25,20 45,30 45,32 25,22" fill="#FFFFFF" opacity="0.6" />
          <polygon points="75,20 95,30 95,32 75,22" fill="#FFFFFF" opacity="0.2" />
        </svg>
      </div>
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
      <p class="loader-text">Initializing NUST NEXUS...</p>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Main App Container -->
  <div id="app"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
