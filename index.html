<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NUST NEXUS — The ultimate academic resource hub for NUST students. Share, download, and collaborate on course materials." />
  <meta name="theme-color" content="#040B14" />
  <title>NUST NEXUS — Student Academic Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <!-- Global Loading Overlay -->
  <div id="global-loader" class="global-loader active">
    <div class="loader-content">
      <div class="loader-logo">
        <img src="/logo.png" alt="NUST NEXUS" class="loader-logo-img" />
      </div>
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
      <p class="loader-text">Initializing NUST NEXUS...</p>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Main App Container -->
  <div id="app"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
